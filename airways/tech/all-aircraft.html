<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>airways / All Aircraft</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <script src="../js/requests.js"></script>
</head>
<body>
<div class="container-xl my-5">
    <h2 class="mb-4">Aircraft Status</h2>
    <div class="table-responsive">

        <div class="d-flex justify-content-between mb-3">
            <button id="prevPageBtn" class="btn btn-outline-primary btn-sm">← Prev Page</button>
            <button id="nextPageBtn" class="btn btn-outline-primary btn-sm">Next Page →</button>
        </div>

        <table class="table table-bordered table-striped table-hover">
            <thead class="table-dark">
            <tr>
                <th>ID</th>
                <th>Type<br>Reg No</th>
                <th>A/C Op</th>
                <th>Flight Mission</th>
                <th>Operational Status<br>Location Status</th>
                <th>Airport</th>
                <th>Lat<br>Long</th>
                <th>Hdg<br>Alt</th>
                <th>Flt Time<br>Cycles</th>
            </tr>
            </thead>
            <tbody id="data-table-body">
            <!-- Rows will be inserted here -->
            </tbody>
        </table>
    </div>
</div>

<script>

    let dataIsLoadingNow = false;
    let pageOffset = 0;
    const pageLimit = 250;

    function showAircraftTable(data) {
        const $tbody = $('#data-table-body');
        $tbody.empty();
        data.forEach(item => {
            const row = `
          <tr>
            <td>${item.id}</td>
            <td>${item.acType}<br>${item.acReg}</td>
            <td>${item.aoName ?? ''}</td>
            <td>${item.fmId !== null ? item.fmId + ' : ' + item.dep + '-' + item.dest : ''}</td>
            <td>${item.opSt}<br>${item.lcSt}</td>
            <td>${item.lcApt ?? ''}</td>
            <td>${item.lat}<br>${item.lon}</td>
            <td>${item.hdg}<br>${item.alt}</td>
            <td>${item.fsTime}<br>${item.fsCycles}</td>
          </tr>`;
            $tbody.append(row);
        })
    }

    function reloadData() {
        if (dataIsLoadingNow) {
            return;
        }
        dataIsLoadingNow = true;

        airwaysGet(`/admin/aircraft/all?offset=${pageOffset}&limit=${pageLimit}`, function (response) {
            dataIsLoadingNow = false;
            showAircraftTable(response);
        },  function () {
            dataIsLoadingNow = false;
            console.error("error loading aircraft data");
        });
    }

    $(document).ready(function () {
        $('#prevPageBtn').on('click', function () {
            if (pageOffset >= pageLimit) {
                pageOffset -= pageLimit;
                reloadData();
            }
        });

        $('#nextPageBtn').on('click', function () {
            pageOffset += pageLimit;
            reloadData();
        });


        reloadData();

        setInterval(() => reloadData(), 60000);
    });

</script>
</body>
</html>
