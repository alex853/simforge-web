<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>airways / Flight Board</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <script src="js/requests.js"></script>

    <style>
        .btn-xsm {
            padding: .15rem .35rem;
            font-size: .725rem;
            line-height: 1.5;
            border-radius: .2rem
        }
        .font-xsm {
            font-size: .875rem;
        }
        .font-xsm {
            font-size: .725rem;
        }
        .font-xxsm {
            font-size: .550rem;
        }

        .time-planned {
        }
        .time-actual {
            font-weight: 600;
        }
        .time-estimated {
            font-style: italic;
            color: gray;
        }
    </style>

</head>
<body>
<div class="container my-5">
    <h2 class="mb-4">Flight Board</h2>
    <div class="mb-3">
        <div class="btn-group" role="group" aria-label="Filter status">
            <button type="button" class="btn btn-outline-primary filter-btn" data-filter="all">All</button>
            <button type="button" class="btn btn-outline-primary filter-btn" data-filter="actual">Actual</button>
            <button type="button" class="btn btn-outline-primary filter-btn" data-filter="actual-manual">Actual & Manual</button>
            <button type="button" class="btn btn-outline-primary filter-btn active" data-filter="shadow-jet">ShadowJet</button>
            <button type="button" class="btn btn-outline-primary filter-btn" data-filter="busy-birds">busyBirds</button>
        </div>
    </div>
    <div class="table-responsive">
        <table class="table table-bordered table-striped table-hover">
            <colgroup> <!-- todo ak1 actual landing airport -->
                <col style="width: 4%;"> <!-- ID -->
                <col style="width: 9%;"> <!-- DOF -->
                <col style="width: 6%;"> <!-- Aircraft --> <!-- todo ak1 add aircraft info -->
<!--                <col>--> <!-- Heartbeat -->
                <col> <!-- Status -->
                <col style="width: 6%;"> <!-- Flt # -->
                <col style="width: 6%;"> <!-- From -->
                <col style="width: 6%;"> <!-- To -->
                <col style="width: 5%;"> <!-- Dep -->
                <col style="width: 5%;"> <!-- T/O -->
                <col style="width: 5%;"> <!-- Land -->
                <col style="width: 5%;"> <!-- Arr -->
                <col style="width: 7%;"> <!-- Total -->
                <col style="width: 3%;"> <!-- Sold -->
                <col style="width: 3%;"> <!-- Ckd In -->
                <col style="width: 3%;"> <!-- On Brd -->
                <col style="width: 5%;"> <!-- Actions -->
            </colgroup>
            <thead class="table-dark">
            <tr>
                <th rowspan="2" class="text-center align-middle">ID</th>
                <th rowspan="2" class="text-center align-middle">DOF</th>
                <th rowspan="2" class="text-center align-middle">Acft</th>
<!--                <th rowspan="2" class="text-center align-middle">Heartbeat</th>-->
                <th rowspan="2" class="text-center align-middle">Status</th>
                <th colspan="3" class="text-center align-middle">Route</th>
                <th colspan="4" class="text-center align-middle">Time</th>
                <th colspan="2" class="text-center align-middle">Tickets</th>
                <th colspan="2" class="text-center align-middle">PAX</th>
                <th rowspan="2" class="text-center align-middle">Actions</th>
            </tr>
            <tr>
                <th class="text-center align-middle">Flt #</th>
                <th class="text-center align-middle">From</th>
                <th class="text-center align-middle">To</th>
                <th class="text-center align-middle">Dep</th>
                <th class="text-center align-middle">T/O</th>
                <th class="text-center align-middle">Land</th>
                <th class="text-center align-middle">Arr</th>
                <th class="text-center align-middle">Total</th>
                <th class="text-center align-middle">Sold</th>
                <th class="text-center align-middle">Ckd In</th>
                <th class="text-center align-middle">On Brd</th>
            </tr>
            </thead>
            <tbody id="table-body">
            <!-- Rows will be inserted here -->
            </tbody>
        </table>
    </div>
</div>

<script>

    // let currentFilter = 'actual'; // Default
    let currentFilter = 'shadow-jet';
    let dataIsLoadingNow = false;

    // Update active filter button
    $('.filter-btn').on('click', function () {
        $('.filter-btn').removeClass('active');
        $(this).addClass('active');
        currentFilter = $(this).data('filter');
        reloadData(); // Reload data using new filter
    });

    function updateTableData(data) {
        const $tbody = $('#table-body');
        $tbody.empty();
        data.forEach(item => {
            const row = `
          <tr>
            <td class="text-center align-middle">
                <span data-bs-toggle="tooltip" title="Transport Flight Id">${item.fmId}</span>
                ${item.tfId != 0 ? `<br><span class="font-xsm" data-bs-toggle="tooltip" title="Transport Flight Id">${item.tfId}</span>` : ''}
            </td>
            <td class="text-center align-middle">${item.dof}</td>
            <td class="text-center align-middle">
                <span class="font-sm">${item.acRg}</span><br>
                <span class="font-xxsm">${item.acId} - ${item.acTp}
            </td>
            <td class="text-center align-middle">
                <span data-bs-toggle="tooltip" title="Flight Mission Status">${item.fmSt}</span>
                ${item.tfSt != null ? (item.tfSt !== item.fmSt ? ` / <span data-bs-toggle="tooltip" title="Transport Flight Status">${item.tfSt}</span>` : '<span class="font-xsm" data-bs-toggle="tooltip" title="Transport Flight Status is the Same">x2</span>') : ''}
                ${item.vcSt != null ? `<br><span class="font-xsm">VATSIM: ${item.vcSt}, ${item.vcLs} secs</span>` : ''}
            </td>
            <td class="text-center align-middle">${item.sfNo ?? ''}</td>
            <td class="text-center align-middle">${item.dep}</td>
            <td class="text-center align-middle">${item.dest}</td>
            <td class="text-center align-middle">${
                item.adep != null ? `<span class="time-actual" data-bs-toggle="tooltip" title="Actual time of Takeoff">${item.adep}</span>` :
                    `<span class="time-planned" data-bs-toggle="tooltip" title="Planned time of Departure">${item.pdep}</span>`}
            </td>
            <td class="text-center align-middle">${
                item.atkf != null ? `<span class="time-actual" data-bs-toggle="tooltip" title="Actual time of Takeoff">${item.atkf}</span>` :
                    `<span class="time-estimated" data-bs-toggle="tooltip" title="Estimated time of Takeoff">${item.etkf}</span>`}
            </td>
            <td class="text-center align-middle">${
                item.aldg != null ? `<span class="time-actual" data-bs-toggle="tooltip" title="Actual time of Landing">${item.aldg}</span>` :
                    `<span class="time-estimated" data-bs-toggle="tooltip" title="Estimated time of Landing">${item.eldg}</span>`}
            </td>
            <td class="text-center align-middle">${
                item.aarr != null ? `<span class="time-actual" data-bs-toggle="tooltip" title="Actual time of Arrival">${item.aarr}</span>` :
                    item.earr != null ? `<span class="time-estimated" data-bs-toggle="tooltip" title="Estimated time of Arrival">${item.earr}</span>` :
                        `<span class="time-planned" data-bs-toggle="tooltip" title="Planned time of Arrival">${item.parr}</span>`}
            </td>
            <td class="text-center align-middle">${item.ttkts ?? ''}</td>
            <td class="text-center align-middle">${item.stkts ?? ''}</td>
            <td class="text-center align-middle">${item.ckdIn ?? ''}</td>
            <td class="text-center align-middle">${item.ponBrd ?? ''}</td>
            <td class="text-center align-middle">
                <!--${item.pcMode ? `<button type="button" class="btn btn-success btn-xsm" onclick="openFlightDashboard(${item.fmId})">D</button>` : ''}-->
                <button type="button" class="btn btn-outline-warning btn-xsm" onclick="adminCancel(${item.fmId})">C</button>
                <!--<button type="button" class="btn btn-outline-danger btn-xsm" onclick="adminRemove(${item.id})">R</button>-->
            </td>
          </tr>`;
            $tbody.append(row);
        })
    }

    function reloadData() {
        if (dataIsLoadingNow) {
            return;
        }
        dataIsLoadingNow = true;
        airwaysGet('/flight-board/' + currentFilter, function (response) {
            dataIsLoadingNow = false;
            updateTableData(response);
        }, function () {
            dataIsLoadingNow = false;
        });
    }

    $(document).ready(function () {
        reloadData();

        setInterval(() => reloadData(), 60000);

        document.addEventListener('DOMContentLoaded', function () {
            const triggers = document.querySelectorAll('[data-bs-toggle="tooltip"]');
            triggers.forEach(el => new bootstrap.Tooltip(el));
        });
    });

/*    function openFlightDashboard(flightId) {
        const url = `./flight-dashboard.html?flightId=${flightId}`;
        window.open(url, 'airways-flight-' + flightId);
    }*/

    function adminCancel(id) { // todo ak0 hide it in Cancelled/Finished statuses
        if (!confirm("Do you want to cancel this flight including transport flight?")) return;
        airwaysGetPlain('/admin/flight/cancel?id=' + id, function (response) {
            alert(response);
            reloadData();
        });
    }

/*    function adminRemove(id) {
        if (!confirm("Do you want to remove this flight?")) return;
        airwaysGetPlain('/admin/transport-flight/remove?tfId=' + id, function () {
            reloadData();
        });
    }*/

</script>
</body>
</html>
