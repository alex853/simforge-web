<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>airways / busyBirds mission booking</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/requests.js"></script>
    <style>
        .table-missions { table-layout: fixed; width: 100%; }
        .table-missions th,
        .table-missions td {
            vertical-align: middle;
            padding: 0.35rem 0.45rem;
        }
        .table-missions .col-radio { width: 5%; min-width: 2.25rem; text-align: center; }
        .table-missions .col-from,
        .table-missions .col-to {
            width: 25%;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }
        .table-missions .col-pax { width: 15%; text-align: center; white-space: nowrap; }
        .table-missions .col-dist { width: 15%; text-align: right; white-space: nowrap; }
        .table-missions .col-pay { width: 15%; text-align: right; white-space: nowrap; }
        .plan-options-row .plan-turnaround-select { width: 6.25rem; max-width: 100%; }
        .plan-options-row > .col:last-child { min-width: 0; }
        .plan-options-row .ferry-check { padding-bottom: 0.15rem; }
        .plan-options-row .ferry-check .form-check-label { line-height: 1.35; }
    </style>
</head>
<body>
<div class="container my-5">
    <div class="row justify-content-center">
        <div class="col-12 col-lg-8">
            <h2 class="mb-3">busyBirds mission booking</h2>
            <p class="text-muted mb-4">Select aircraft and mission, preview legs, then book or go back.</p>

            <div id="alertHost"></div>

            <!-- Step 1: mission + aircraft -->
            <div id="panelSelect">
                <div class="mb-3">
                    <label class="form-label mb-1" for="aircraftSelect">Aircraft</label>
                    <select id="aircraftSelect" class="form-select form-select" disabled>
                        <option value="">Loading…</option>
                    </select>
                    <div class="form-text" id="aircraftHelp"></div>
                </div>

                <h6 class="mb-2 text-secondary">Missions</h6>
                <div class="table-responsive">
                    <table class="table table-bordered table-striped table-hover table table-missions">
                        <thead class="table-light">
                        <tr>
                            <th class="col-radio"></th>
                            <th class="col-from">From</th>
                            <th class="col-to">To</th>
                            <th class="col-pax">PAX</th>
                            <th class="col-dist">Distance</th>
                            <th class="col-pay">Pay</th>
                        </tr>
                        </thead>
                        <tbody id="missionsBody">
                        <tr><td colspan="6" class="text-muted text-center">Loading…</td></tr>
                        </tbody>
                    </table>
                </div>

                <div class="mt-3">
                    <button type="button" id="btnShowLegs" class="btn btn-primary btn">Show legs</button>
                </div>
            </div>
        </div>
    </div>
</div>

<!-- Plan modal (messages or legs) -->
<div class="modal fade" id="planModal" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog modal-lg modal-dialog-scrollable">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title" id="planModalTitle">Proposed Mission Plan</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
            </div>
            <div class="modal-body">
                <div id="planMetaWrap" class="mb-2" style="display: none;">
                    <div class="text-muted">Aircraft</div>
                    <div class="mb-2">
                        <span class="fw-bold" id="planMetaAcReg"></span>
                        <span class="text-muted" id="planMetaAcType"></span>
                        <span class="text-muted" id="planMetaAcLoc"></span>
                    </div>
                    <div class="text-muted">Mission</div>
                    <div class="mb-0">
                        <span class="fw-bold" id="planMetaMissionRoute"></span>
                        <span class="text-muted">Pay:</span> <span class="fw-bold" id="planMetaMissionPay"></span>
                    </div>
                    <hr class="my-2">
                </div>

                <div id="planMessagesWrap" style="display: none;">
                    <ul class="mb-0 ps-3" id="planMessagesList"></ul>
                </div>

                <div id="planLegsWrap" style="display: none;">
                    <div class="row g-2 align-items-end mb-3 plan-options-row">
                        <div class="col-md-4 col-lg-5">
                            <label class="form-label mb-1" for="planSelect">Plan</label>
                            <select id="planSelect" class="form-select form-select-sm">
                                <option value="" disabled selected>Select plan…</option>
                            </select>
                        </div>
                        <div class="col-auto">
                            <label class="form-label mb-1 text-nowrap" for="turnaroundSelect">Turnaround time</label>
                            <select id="turnaroundSelect" class="form-select form-select-sm plan-turnaround-select">
                                <option value="1">1 hour</option>
                                <option value="3">3 hours</option>
                                <option value="6">6 hours</option>
                                <option value="12">12 hours</option>
                                <option value="24">24 hours</option>
                            </select>
                        </div>
                        <div class="col">
                            <div class="form-check mb-1 ferry-check">
                                <input type="checkbox" class="form-check-input" id="ferryBackToBase" name="ferryBackToBase" checked>
                                <label class="form-check-label" for="ferryBackToBase">Ferry flight back to base</label>
                            </div>
                        </div>
                    </div>
                    <div class="table-responsive">
                        <table class="table table-bordered table-striped table mb-0">
                            <thead class="table-light">
                            <tr>
                                <th style="width: 2rem;" class="text-center">#</th>
                                <th style="width: 6rem;" class="text-center">DOF</th>
                                <th style="width: 5rem;" class="text-center">From</th>
                                <th style="width: 5rem;" class="text-center">To</th>
                                <th style="width: 6rem;" class="text-center">Type</th>
                                <th style="width: 3rem;" class="text-center">PAX</th>
                                <th style="width: 6rem;" class="text-center">Distance</th>
                            </tr>
                            </thead>
                            <tbody id="planLegsBody"></tbody>
                        </table>
                    </div>
                </div>
            </div>
            <div class="modal-footer">
                <button type="button" class="btn btn-outline-secondary btn" data-bs-dismiss="modal">Back</button>
                <button type="button" id="btnPlanBook" class="btn btn-success btn" style="display: none;">Book</button>
            </div>
        </div>
    </div>
</div>

<script>

    let missions = [];
    let aircraft = [];
    let selectedMissionId = null;
    let selectedAircraftId = null;
    let legsPayload = [];
    let buildPlans = [];
    let planModal;

    function showAlert(type, message) {
        const html = '<div class="alert alert-' + type + ' alert-dismissible fade show" role="alert">' +
            message +
            '<button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button></div>';
        $('#alertHost').html(html);
    }

    function clearAlert() {
        $('#alertHost').empty();
    }

    function formatPay(n) {
        if (n === undefined || n === null || n === '') {
            return '—';
        }
        const num = Number(n);
        if (Number.isNaN(num)) {
            return String(n);
        }
        return num.toLocaleString();
    }

    function renderMissions(data) {
        missions = Array.isArray(data) ? data : [];
        const $tb = $('#missionsBody');
        $tb.empty();
        if (missions.length === 0) {
            $tb.append('<tr><td colspan="6" class="text-muted text-center">No missions</td></tr>');
            return;
        }
        missions.forEach(function (m) {
            const id = m.id;
            const dist = m.distance ?? m.distanceNm ?? '';
            const pay = formatPay(m.pay ?? m.payment);
            const row = $('<tr></tr>');
            row.append($('<td class="col-radio"></td>').append(
                $('<input type="radio" class="form-check-input mission-radio" name="missionId">').attr('value', id)
            ));
            const $from = $('<td class="col-from"></td>').text(m.fromCityName ?? '');
            $from.attr('title', m.fromCityName ?? '');
            const $to = $('<td class="col-to"></td>').text(m.toCityName ?? '');
            $to.attr('title', m.toCityName ?? '');
            row.append($from, $to);
            row.append($('<td class="col-pax"></td>').text(m.pax ?? ''));
            row.append($('<td class="col-dist"></td>').text(dist !== '' && dist !== null ? String(dist) : '—'));
            row.append($('<td class="col-pay"></td>').text(pay));
            $tb.append(row);
        });
    }

    function renderAircraftList(list) {
        aircraft = Array.isArray(list) ? list : [];
        const $sel = $('#aircraftSelect');
        $sel.empty();
        if (!aircraft || aircraft.length === 0) {
            $sel.append('<option value="">No aircraft</option>');
            $sel.prop('disabled', true);
            $('#aircraftHelp').text('No aircraft returned (check ' + '/busy-birds/aircraft/available' + ').');
            return;
        }
        $sel.append('<option value="">Choose aircraft…</option>');
        aircraft.forEach(function (a) {
            const id = a.id;
            const reg = a.regNo ?? '';
            const type = a.typeCode ?? a.type ?? '';
            const loc = a.locationAirportIcao ?? a.locationAirportName ?? a.locationAirportId ?? '';
            const parts = [reg || ('#' + id), type, loc].filter(function (p) { return p; });
            const label = parts.join(' · ');
            $sel.append($('<option></option>').attr('value', id).text(label));
        });
        $sel.prop('disabled', false);
        $('#aircraftHelp').text('');
    }

    function sameId(a, b) {
        return a != null && b != null && String(a) === String(b);
    }

    function refreshPlanMeta() {
        const m = missions.find(function (x) { return sameId(x.id, selectedMissionId); });
        const a = aircraft.find(function (x) { return sameId(x.id, selectedAircraftId); });
        if (!m || !a) {
            $('#planMetaWrap').hide();
            return;
        }

        const acReg = a.regNo ?? ('#' + a.id);
        const acType = a.typeCode ?? a.type ?? '';
        const acLoc = a.locationAirportIcao ?? a.locationAirportName ?? a.locationAirportId ?? '';

        const route = (m.fromCityName ?? '') + ' → ' + (m.toCityName ?? '');
        const pay = formatPay(m.pay ?? m.payment);

        $('#planMetaAcReg').text(acReg);
        $('#planMetaAcType').text(acType ? (' · ' + acType) : '');
        $('#planMetaAcLoc').text(acLoc ? (' · ' + acLoc) : '');
        $('#planMetaMissionRoute').text(route);
        $('#planMetaMissionPay').text(pay);

        $('#planMetaWrap').show();
    }

    function normalizePlanResponse(response) {
        if (response && Array.isArray(response.legs)) {
            return {legs: response.legs, messages: null};
        }
        if (response && Array.isArray(response.messages)) {
            return {legs: null, messages: response.messages};
        }
        if (Array.isArray(response)) {
            if (response.length > 0 && typeof response[0] === 'string') {
                return {legs: null, messages: response};
            }
            return {legs: response, messages: null};
        }
        return {legs: null, messages: ['Unexpected get-plan response']};
    }

    function normalizeBuildPlansResponse(response) {
        if (response && Array.isArray(response.messages)) {
            return {plans: null, messages: response.messages};
        }
        const rawPlans = response && Array.isArray(response.plans) ? response.plans : null;
        if (!rawPlans) {
            return {plans: null, messages: ['Unexpected build-plans response']};
        }
        return {
            plans: rawPlans.map(function (p, idx) {
                const norm = normalizePlanResponse(p);
                return {
                    id: p.id != null ? p.id : idx,
                    description: p.description ?? ('Plan ' + (idx + 1)),
                    legs: norm.legs,
                    messages: norm.messages
                };
            }),
            messages: null
        };
    }

    function renderPlanSelect(plans) {
        const $sel = $('#planSelect');
        $sel.empty();
        plans.forEach(function (p) {
            $sel.append($('<option></option>').attr('value', p.id).text(p.description));
        });
    }

    function findPlanById(planId) {
        const idStr = String(planId);
        return buildPlans.find(function (p) { return String(p.id) === idStr; });
    }

    function applySelectedPlan(planId) {
        const plan = findPlanById(planId);
        if (!plan) {
            renderLegs([]);
            return;
        }
        if (plan.messages) {
            const $tb = $('#planLegsBody');
            $tb.empty();
            legsPayload = [];
            const arr = Array.isArray(plan.messages) ? plan.messages : [plan.messages];
            arr.forEach(function (m) {
                const text = typeof m === 'string' ? m : (m && m.message != null ? String(m.message) : JSON.stringify(m));
                $tb.append('<tr><td colspan="7" class="text-muted text-center">' + text + '</td></tr>');
            });
            return;
        }
        renderLegs(plan.legs);
    }

    function showMessagesModal(messages) {
        $('#planModalTitle').text('Messages');
        $('#planMetaWrap').hide();
        $('#planLegsWrap').hide();
        $('#planMessagesWrap').show();
        $('#btnPlanBook').hide();

        const $list = $('#planMessagesList');
        $list.empty();
        const arr = Array.isArray(messages) ? messages : (messages != null ? [messages] : []);
        if (arr.length === 0) {
            $list.append($('<li></li>').text('No details.'));
        } else {
            arr.forEach(function (m) {
                const text = typeof m === 'string' ? m : (m && m.message != null ? String(m.message) : JSON.stringify(m));
                $list.append($('<li></li>').text(text));
            });
        }
        planModal.show();
    }

    function legCell(leg, keyCandidates, fallback) {
        for (let i = 0; i < keyCandidates.length; i++) {
            const k = keyCandidates[i];
            if (leg[k] !== undefined && leg[k] !== null && leg[k] !== '') {
                return leg[k];
            }
        }
        return fallback;
    }

    function renderLegs(legs) {
        legsPayload = legs;
        const $tb = $('#planLegsBody');
        $tb.empty();
        if (!legs || legs.length === 0) {
            $tb.append('<tr><td colspan="7" class="text-muted text-center">No legs in response</td></tr>');
            return;
        }
        legs.forEach(function (leg, idx) {
            const from = legCell(leg, ['fromAirportIcao', 'fromIcao', 'fromAirport', 'departureAirport', 'from', 'depIcao'], '—');
            const to = legCell(leg, ['toAirportIcao', 'toIcao', 'toAirport', 'arrivalAirport', 'to', 'destIcao'], '—');
            const type = legCell(leg, ['type', 'legType', 'kind', 'flightType'], '—');
            const pax = (String(type).toLowerCase() === 'revenue') ? (leg.pax ?? '') : '';
            const dof = legCell(leg, ['dof'], '—');
            const depTime = legCell(leg, ['depTime'], '—');
            const arrTime = legCell(leg, ['arrTime'], '—');
            const distance = legCell(leg, ['distance'], '—');

            const row = '<tr>' +
                '<td class="text-center">' + (idx + 1) + '</td>' +
                '<td class="text-center">' + dof + '</td>' +
                '<td class="text-center">' + from + '<br><span style="font-size: 0.8em;">' + depTime + '</span></td>' +
                '<td class="text-center">' + to + '<br><span style="font-size: 0.8em;">' + arrTime + '</span></td>' +
                '<td class="text-center">' + type + '</td>' +
                '<td class="text-center">' + pax + '</td>' +
                '<td class="text-center">' + distance + '</td>' +
                '</tr>';
            $tb.append(row);
        });
    }

    function getPlanOptionParams() {
        return {
            turnaroundTime: parseInt($('#turnaroundSelect').val(), 10),
            ferryBackToBase: $('#ferryBackToBase').is(':checked')
        };
    }

    function getBuildPlansParams() {
        return Object.assign({
            missionId: selectedMissionId,
            aircraftId: selectedAircraftId
        }, getPlanOptionParams());
    }

    function showLegsModal(plans, options) {
        options = options || {};
        buildPlans = plans;
        $('#planModalTitle').text('Proposed Mission Plan');
        $('#planMessagesWrap').hide();
        $('#planLegsWrap').show();
        $('#btnPlanBook').show();
        refreshPlanMeta();
        renderPlanSelect(plans);
        let planId = plans[0].id;
        if (options.preferredPlanId != null) {
            const found = plans.find(function (p) {
                return String(p.id) === String(options.preferredPlanId);
            });
            if (found) {
                planId = found.id;
            }
        }
        $('#planSelect').val(String(planId));
        applySelectedPlan(planId);
        if (!options.skipShowModal) {
            planModal.show();
        }
    }

    function setPlanOptionsBusy(busy) {
        $('#turnaroundSelect, #ferryBackToBase, #planSelect').prop('disabled', busy);
    }

    function loadBuildPlans(options) {
        options = options || {};
        const missionId = options.missionId != null ? options.missionId : selectedMissionId;
        const aircraftId = options.aircraftId != null ? options.aircraftId : selectedAircraftId;
        if (!missionId || !aircraftId) {
            if (!options.silent) {
                showAlert('warning', 'Select a mission and aircraft.');
            }
            return;
        }
        selectedMissionId = missionId;
        selectedAircraftId = aircraftId;

        const preferredPlanId = options.refresh
            ? $('#planSelect').val()
            : null;

        setPlanOptionsBusy(true);
        airwaysAuth('GET', '/busy-birds/mission/build-plans', getBuildPlansParams(), function (response) {
            setPlanOptionsBusy(false);
            const result = normalizeBuildPlansResponse(response);
            if (result.messages) {
                showMessagesModal(result.messages);
                return;
            }
            if (!result.plans || result.plans.length === 0) {
                showMessagesModal(['No plans available.']);
                return;
            }
            const hasLegs = result.plans.some(function (p) { return p.legs && p.legs.length > 0; });
            if (!hasLegs) {
                const withMessages = result.plans.find(function (p) { return p.messages; });
                showMessagesModal(withMessages ? withMessages.messages : ['No legs in any plan.']);
                return;
            }
            showLegsModal(result.plans, {
                skipShowModal: !!options.refresh,
                preferredPlanId: preferredPlanId
            });
        }, function (xhr) {
            setPlanOptionsBusy(false);
            const j = xhr && xhr.responseJSON;
            const result = normalizeBuildPlansResponse(j);
            if (result.messages) {
                showMessagesModal(result.messages);
                return;
            }
            if (!options.refresh) {
                showAlert('danger', 'Failed to load plans. Check endpoint ' + '/busy-birds/mission/build-plans' + ' and parameters.');
            } else {
                showMessagesModal(['Failed to refresh plans.']);
            }
        });
    }

    function getSelectedMissionId() {
        const v = $('input.mission-radio:checked').val();
        return (v != null && v !== '') ? String(v) : null;
    }

    function getSelectedAircraftId() {
        const v = $('#aircraftSelect').val();
        return (v != null && v !== '') ? String(v) : null;
    }

    $(document).ready(function () {
        planModal = new bootstrap.Modal(document.getElementById('planModal'));

        airwaysAuth('GET', '/busy-birds/mission/to-book', {}, function (data) {
            renderMissions(data);
        }, function () {
            $('#missionsBody').html('<tr><td colspan="6" class="text-danger text-center">Failed to load missions</td></tr>');
        });

        airwaysAuth('GET', '/busy-birds/aircraft/available', {}, function (list) {
            renderAircraftList(list);
        }, function () {
            const $sel = $('#aircraftSelect');
            $sel.empty();
            $sel.append('<option value="">Unavailable</option>');
            $sel.prop('disabled', true);
            $('#aircraftHelp').text('Aircraft list not available yet.');
        });

        $('#btnShowLegs').on('click', function () {
            clearAlert();
            const missionId = getSelectedMissionId();
            const aircraftId = getSelectedAircraftId();
            if (!missionId) {
                showAlert('warning', 'Select a mission.');
                return;
            }
            if (!aircraftId) {
                showAlert('warning', 'Select an aircraft.');
                return;
            }
            loadBuildPlans({missionId: missionId, aircraftId: aircraftId});
        });

        $('#turnaroundSelect, #ferryBackToBase').on('change', function () {
            if (!selectedMissionId || !selectedAircraftId) {
                return;
            }
            if (!$('#planLegsWrap').is(':visible')) {
                return;
            }
            loadBuildPlans({refresh: true, silent: true});
        });

        $('#planSelect').on('change', function () {
            const planId = $(this).val();
            if (planId === '' || planId == null) {
                return;
            }
            applySelectedPlan(planId);
        });

        $('#btnPlanBook').on('click', function () {
            const missionId = selectedMissionId;
            const aircraftId = selectedAircraftId;
            const plan = findPlanById($('#planSelect').val());
            if (!missionId || !aircraftId) {
                showMessagesModal(['Missing mission or aircraft; close and try again.']);
                return;
            }
            if (!plan) {
                showMessagesModal(['Select a plan.']);
                return;
            }
            airwaysAuth('PUT', '/busy-birds/mission/book', Object.assign({
                missionId: missionId,
                aircraftId: aircraftId,
                planId: plan.id
            }, getPlanOptionParams()), function (response) {
                window.location.href = 'flight-dashboard.html';
            }, function (xhr) {
                const j = xhr.responseJSON;
                const plan = normalizePlanResponse(j);
                if (plan.messages) {
                    showMessagesModal(plan.messages);
                    return;
                }
                showMessagesModal(['Booking failed.']);
            });
        });
    });
</script>
</body>
</html>
