<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>airways / Flight Dashboard</title>
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="js/requests.js"></script>
    <style>
        body, html {
            height: 100%;
            margin: 0;
        }

        .outer {
            height: 100%;
            width: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .dashboard {
            width: 50rem;
            height: 34rem;
            background: #fff;
            border: 1px solid #ccc;
            border-radius: 12px;
            display: flex;
            flex-direction: column;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
            overflow: hidden;
        }

        .dashboard-header {
            background: #f8f9fa;
            border-bottom: 1px solid #ddd;
            padding: 0.75rem;
            text-align: center;
            font-size: 1.25rem;
            font-weight: bold;
        }

        .dashboard-body {
            flex: 1;
            display: flex;
            flex-direction: row;
        }

        .sidebar {
            width: 15rem;
            border-right: 1px solid #ddd;
            overflow-y: auto;
            padding: 1rem;
        }

        .main {
            flex: 1;
            display: flex;
            flex-direction: column;
        }

        .hidden {
            display: none;
        }

        .section-top {
            /*flex: 1;*/
            height: 3rem;
            display: flex;
            border-bottom: 1px solid #eee;
            flex-direction: row;
        }

        .section {
            /*flex: 3;*/
            display: flex;
            border-bottom: 1px solid #eee;
        }

        .section:last-child {
            border-bottom: none;
        }

        .section-label {
            width: 2.5rem;
            background: #f8f9fa;
            display: flex;
            justify-content: center;
            align-items: center;
            font-weight: bold;
            font-size: 0.9rem;
            writing-mode: vertical-rl;
            transform: rotate(180deg);
            border-right: 1px solid #eee;
        }

        .section-content {
            flex: 1;
            padding: 1rem;
        }

        .airport-icao {
            font-size: 3rem;
            text-align: center;
        }

        .flight-time {
            font-size: 1.0rem;
            text-align: center;
        }

        .time-planned {
        }
        .time-actual {
            font-weight: 600;
        }
        .time-estimated {
            font-style: italic;
            color: gray;
        }



        .stage-title {
            text-align: center;
            font-size: 1.5rem;
        }

        .stage-content {
            text-align: center;
        }

        .stage-buttons {
            text-align: center;
        }


        .flight-list-item {
            cursor: pointer;
        }

        .flight-list-item.flight-selected {
            border: 2px solid #0d6efd; /* bootstrap primary */
        }

        .flight-dof-today {
            background-color: #eaf7ee; /* light green */
        }

        .flight-dof-tomorrow {
            background-color: #eaf2ff; /* light blue */
        }

        .flight-dof-future {
            background-color: #f3f7ff; /* very light blue */
        }

        .flight-dof-past {
            background-color: #fff8db; /* light yellow */
        }
    </style>
</head>
<body>
<div class="outer">
    <div class="dashboard">
        <div class="dashboard-header">
            Flight Dashboard
        </div>

        <div class="dashboard-body">
            <div class="sidebar">
                <h5>Flights</h5>
                <ul class="list-group" id="flightList">
                </ul>
            </div>

            <div class="main">
                <div class="section-top">
                    <div style="flex: 1; border-right: 1px solid #eee; display: flex; flex-direction: row; font-size: 0.75em; text-align: center;">
                        <div style="flex: 2;">Sim<br><span id="sim-status-status">---</span></div>
                        <div style="flex: 3;"><span id="sim-status-location-status">---</span><br><span id="sim-status-airport-icao">---</span></div>
                        <div style="flex: 1;">P/B<br><span id="sim-status-parking-brake">---</span></div>
                        <div style="flex: 1;">ENG<br><span id="sim-status-engine-running">---</span></div>
                        <div style="flex: 1;">G/S<br><span id="sim-status-measured-gs">---</span></div>
                    </div>
                    <div style="flex: 1;">VATSIM</div>
                </div>

                <div class="section" style="flex-direction: column;">
                    <div style="display: flex; flex-direction: row;">
                        <div style="flex: 2;"></div>
                        <div id="flight-route-departure-icao" class="airport-icao" style="flex: 3;">AAAA</div>
                        <div class="airport-icao" style="flex: 1;">-</div>
                        <div id="flight-route-destination-icao" class="airport-icao" style="flex: 3;">ZZZZ</div>
                        <div style="flex: 2;"></div>
                    </div>
                    <div style="display: flex; flex-direction: row;">
                        <div style="flex: 1;"></div>
                        <div id="flight-time-of-departure" class="flight-time" style="flex: 1;">00:00</div>
                        <div id="flight-time-of-takeoff" class="flight-time" style="flex: 1;">00:10</div>
                        <div id="flight-time-of-landing" class="flight-time" style="flex: 1;">01:00</div>
                        <div id="flight-time-of-arrival" class="flight-time" style="flex: 1;">01:10</div>
                        <div style="flex: 1;"></div>
                    </div>
                    <div id="flight-stage-dispatched" class="hidden">
                        <div class="stage-title">Before Start Flight</div>
                        <div class="stage-content">[CHECKS]</div>
                        <div class="stage-buttons">
                            <button id="flight-stage-dispatched-start-flight-disabled-button" class="btn btn-outline-danger m-2 disabled hidden">Start Flight</button>
                            <button id="flight-stage-dispatched-start-flight-button" class="btn btn-success m-2 hidden" onclick="action_StartFlight();">Start Flight</button>
                        </div>
                    </div>
                    <div id="flight-stage-preflight" class="hidden">
                        <div class="stage-title">Preflight</div>
                        <div class="stage-content">[CHECKS]</div>
                        <div class="stage-buttons">
                            <button id="flight-stage-preflight-start-boarding-disabled-button" class="btn btn-outline-danger m-2 disabled hidden">Start Boarding</button>
                            <button id="flight-stage-preflight-start-boarding-button" class="btn btn-success m-2 hidden" onclick="action_StartBoarding();">Start Boarding</button>

                            <button id="flight-stage-preflight-blocks-off-automatically-button" class="btn btn-outline-primary m-2 disabled hidden">Blocks Off will be tracked automatically</button>
                        </div>
                    </div>
                    <div id="flight-stage-departure" class="hidden">
                        <div class="stage-title">Departure</div>
                        <div class="stage-content">[CHECKS]</div>
                        <div class="stage-buttons">
                            <button id="flight-stage-departure-takeoff-automatically-button" class="btn btn-outline-primary m-2 disabled">Takeoff will be tracked automatically</button>
                        </div>
                    </div>
                    <div id="flight-stage-flying" class="hidden">
                        <div class="stage-title">Flying</div>
                        <div class="stage-content">[CHECKS]</div>
                        <div class="stage-buttons">
                            <button id="flight-stage-flying-landing-automatically-button" class="btn btn-outline-primary m-2 disabled">Landing will be tracked automatically</button>
                        </div>
                    </div>
                    <div id="flight-stage-arrival" class="hidden">
                        <div class="stage-title">Arrival</div>
                        <div class="stage-content">[CHECKS]</div>
                        <div class="stage-buttons">
                            <button id="flight-stage-arrival-blocks-on-automatically-button" class="btn btn-outline-primary m-2 disabled">Blocks On will be tracked automatically</button>
                        </div>
                    </div>
                    <div id="flight-stage-postflight" class="hidden">
                        <div class="stage-title">Postflight</div>
                        <div class="stage-content">[CHECKS]</div>
                        <div class="stage-buttons">
                            <button id="flight-stage-postflight-start-deboarding-disabled-button" class="btn btn-outline-danger m-2 disabled hidden">Start Deboarding</button>
                            <button id="flight-stage-postflight-start-deboarding-button" class="btn btn-success m-2 hidden" onclick="action_StartDeboarding();">Start Deboarding</button>

                            <button id="flight-stage-postflight-finish-flight-disabled-button" class="btn btn-outline-danger m-2 disabled hidden">Finish Flight</button>
                            <button id="flight-stage-postflight-finish-flight-button" class="btn btn-success m-2 hidden" onclick="action_FinishFlight();">Finish Flight</button>
                        </div>
                    </div>
                    <div id="flight-stage-finished" class="hidden">
                        <div class="stage-title">Finished</div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<script>

    let myFlights = [];
    let selectedFlightId = null;

    // restored original single-flight state
    let flightId;
    let refreshTimerId = null;

    function escapeHtml(s) {
        return String(s ?? '')
            .replace(/&/g, '&amp;')
            .replace(/</g, '&lt;')
            .replace(/>/g, '&gt;')
            .replace(/"/g, '&quot;')
            .replace(/'/g, '&#039;');
    }

    function updateUI() {
        $('#acReg').text(flightInfo.aircraft.regNo);
        $('#acType').text(flightInfo.aircraft.type);
        $('#acLocationStatus').text(flightInfo.aircraft.locationStatus);
        $('#acOperationalStatus').text(flightInfo.aircraft.operationalStatus);

        $('#fltDepIcao').text(flightInfo.flight.depIcao);
        $('#fltDestIcao').text(flightInfo.flight.destIcao);
        const planDOF = flightInfo.flight.planDOF ?? '';
        $('#fltPlanDOF').text(planDOF);
        $('#fltPlanDOFLabel').text('');
        if (planDOF) {
            const todayUtc = new Date().toISOString().slice(0, 10); // yyyy-mm-dd
            const yesterdayDate = new Date();
            yesterdayDate.setUTCDate(yesterdayDate.getUTCDate() - 1);
            const yesterdayUtc = yesterdayDate.toISOString().slice(0, 10);

            const tomorrowDate = new Date();
            tomorrowDate.setUTCDate(tomorrowDate.getUTCDate() + 1);
            const tomorrowUtc = tomorrowDate.toISOString().slice(0, 10);

            const datDate = new Date();
            datDate.setUTCDate(datDate.getUTCDate() + 2);
            const datUtc = datDate.toISOString().slice(0, 10);

            let label = '';
            if (planDOF === yesterdayUtc) label = ' (Yesterday)';
            else if (planDOF === todayUtc) label = ' (Today)';
            else if (planDOF === tomorrowUtc) label = ' (Tomorrow)';
            else if (planDOF === datUtc) label = ' (Day after tomorrow)';

            $('#fltPlanDOFLabel').text(label);
        }
        $('#fltPlanDepTime').text(flightInfo.flight.planDepTime);
        $('#fltPlanArrTime').text(flightInfo.flight.planArrTime);

        $('#fltStatus').text(flightInfo.flight.status);
        refreshNextStatus(flightInfo.flight.nextPlannedStatus, '#fltNextStatus');

        refreshShownElement(flightInfo.flight.shownElements, 'start', '#fltBtnStart');
        refreshShownElement(flightInfo.flight.shownElements, 'start-early-with-caution', '#fltBtnStartEarly');
        refreshShownElement(flightInfo.flight.shownElements, 'blocks-off', '#fltBtnBlocksOff');
        refreshShownElement(flightInfo.flight.shownElements, 'blocks-off-disabled', '#fltBtnBlocksOffDisabled');
        refreshShownElement(flightInfo.flight.shownElements, 'takeoff', '#fltBtnTakeoff');
        refreshShownElement(flightInfo.flight.shownElements, 'landing', '#fltBtnLanding');
        refreshShownElement(flightInfo.flight.shownElements, 'landing-disabled', '#fltBtnLandingDisabled');
        refreshShownElement(flightInfo.flight.shownElements, 'blocks-on', '#fltBtnBlocksOn');
        refreshShownElement(flightInfo.flight.shownElements, 'finish', '#fltBtnFinish');
        refreshShownElement(flightInfo.flight.shownElements, 'finish-disabled', '#fltBtnFinishDisabled');

        refreshNextStatus(flightInfo.transportFlight?.nextPlannedStatus, '#tfNextStatus');
        $('#tfStatus').text(flightInfo.transportFlight?.status ?? 'N/A');

        refreshShownElement(flightInfo.transportFlight?.shownElements, 'sold', '#tfSoldDiv');
        $('#tfSoldSeats').text(flightInfo.transportFlight?.soldSeats ?? '')
        $('#tfTotalSeats').text(flightInfo.transportFlight?.totalSeats ?? '')
        $('#tfRemainedSeats').text(flightInfo.transportFlight?.remainedTickets ?? '')

        refreshShownElement(flightInfo.transportFlight?.shownElements, 'check-in', '#tfCheckInDiv');
        $('#tfCheckInSeats').text(flightInfo.transportFlight?.checkedIn ?? '')
        $('#tfCheckInSoldSeats').text(flightInfo.transportFlight?.soldSeats ?? '')

        refreshShownElement(flightInfo.transportFlight?.shownElements, 'on-board', '#tfOnBoardDiv');
        $('#tfOnBoard').text(flightInfo.transportFlight?.onBoard ?? '')

        refreshShownElement(flightInfo.transportFlight?.shownElements, 'start-boarding', '#tfBtnStartBoarding');
        refreshShownElement(flightInfo.transportFlight?.shownElements, 'start-boarding-disabled', '#tfBtnStartBoardingDisabled');
        refreshShownElement(flightInfo.transportFlight?.shownElements, 'start-deboarding', '#tfBtnStartDeboarding');
        refreshShownElement(flightInfo.transportFlight?.shownElements, 'start-deboarding-disabled', '#tfBtnStartDeboardingDisabled');
    }

    function refreshShownElement(shownElements, action, buttonId) {
        if (shownElements) {
            const actions = shownElements
                .split(',')
                .map(a => a.trim())
                .filter(a => a.length > 0);

            if (actions.includes(action)) {
                $(buttonId).show();
            } else {
                $(buttonId).hide();
            }
        } else {
            $(buttonId).hide();
        }
    }

    function refreshNextStatus(nextStatus, nextStatusId) {
        if (nextStatus) {
            $(nextStatusId).text(nextStatus);
            $(nextStatusId + 'Wrap').show();
        } else {
            $(nextStatusId).text('');
            $(nextStatusId + 'Wrap').hide();
        }
    }

    function refreshSelectedFromMyFlights() {
        const selected = myFlights?.find(f => f?.flight?.id === flightId);
        if (selected) {
            flightInfo = selected;
            updateUI();
        }
    }

    function restartRefreshTimer() {
        if (refreshTimerId) {
            clearInterval(refreshTimerId);
        }
        refreshTimerId = setInterval(function () {
            // loadMyFlights(false);
            loadStatus2(false);
        }, 10000);
    }

    function renderFlightList() {
        const $list = $('#flightList');
        $list.empty();

        if (!myFlights || myFlights.length === 0) {
            $list.append('<li class="list-group-item text-secondary">No flights</li>');
            return;
        }

        for (const f of myFlights) {
            const flight = f.flight ?? {};
            const id = flight.id;
            const dep = escapeHtml(flight.depIcao ?? '');
            const dest = escapeHtml(flight.destIcao ?? '');
            const status = escapeHtml(flight.status ?? '');
            const planDep = escapeHtml(flight.planDepTime ?? '');
            const dof = escapeHtml(flight.planDOF ?? '');

            const isActive = (id === selectedFlightId);
            const selectedClass = isActive ? ' flight-selected' : '';

            const todayUtc = new Date().toISOString().slice(0, 10); // yyyy-mm-dd
            const tomorrowDate = new Date();
            tomorrowDate.setUTCDate(tomorrowDate.getUTCDate() + 1);
            const tomorrowUtc = tomorrowDate.toISOString().slice(0, 10);
            const dayAfterTomorrowDate = new Date();
            dayAfterTomorrowDate.setUTCDate(dayAfterTomorrowDate.getUTCDate() + 2);
            const dayAfterTomorrowUtc = dayAfterTomorrowDate.toISOString().slice(0, 10);

            let whenText = '';
            if (dof && dof === todayUtc) {
                whenText = 'Today';
            } else if (dof && dof === tomorrowUtc) {
                whenText = 'Tomorrow';
            } else if (dof && dof < todayUtc) {
                whenText = dof;
            } else if (dof) {
                whenText = dof;
            }

            let dofClass = '';
            if (dof && dof === todayUtc) {
                dofClass = ' flight-dof-today';
            } else if (dof && dof === tomorrowUtc) {
                dofClass = ' flight-dof-tomorrow';
            } else if (dof && dof < todayUtc) {
                dofClass = ' flight-dof-past';
            } else if (dof && dof >= dayAfterTomorrowUtc) {
                dofClass = ' flight-dof-future';
            } else if (dof) {
                // dof is after tomorrow but we don't really expect gaps; treat as future
                dofClass = ' flight-dof-future';
            }

            const whenHtml = (whenText && planDep)
                ? ('<div><small>' + escapeHtml(whenText) + ' at ' + planDep + '</small></div>')
                : (planDep ? ('<div><small>' + planDep + '</small></div>') : '');

            const $item = $(
                '<li class="list-group-item flight-list-item' + selectedClass + dofClass + '">' +
                '  <div class="fw-semibold">' + dep + ' → ' + dest + '</div>' +
                '  <div><small>' + status + '</small></div>' +
                whenHtml +
                '</li>'
            );

            $item.on('click', function () {
                selectFlight(id);
            });

            $list.append($item);
        }
    }

    function renderStatus2(status) {
        flightId = status.flight ? status.flight.fmId : null;

        $('#sim-status-status').text(status.sim.status);
        $('#sim-status-location-status').text(status.sim.locationStatus);
        $('#sim-status-airport-icao').text(status.sim.airportIcao);
        $('#sim-status-parking-brake').text(status.sim.parkingBrake === null ? '' : status.sim.parkingBrake ? 'SET' : 'OFF');
        $('#sim-status-engine-running').text(status.sim.engineRunning === null ? '' : status.sim.engineRunning ? 'RUN' : 'OFF');
        $('#sim-status-measured-gs').text(status.sim.measuredGs);

        if (!status.flight) {
            // todo ak1 show 'no flight' panel
            return;
        }

        $('#flight-route-departure-icao').text(status.flight.dep);
        $('#flight-route-destination-icao').text(status.flight.dest);

        renderFlightTimeField('#flight-time-of-departure', status, 'dep');
        renderFlightTimeField('#flight-time-of-takeoff', status, 'tkf');
        renderFlightTimeField('#flight-time-of-landing', status, 'ldg');
        renderFlightTimeField('#flight-time-of-arrival', status, 'arr');

        hide('#flight-stage-dispatched');
        hide('#flight-stage-preflight');
        hide('#flight-stage-departure');
        hide('#flight-stage-flying');
        hide('#flight-stage-arrival');
        hide('#flight-stage-postflight');
        hide('#flight-stage-finished');

        const flightStatus = status.flight.fmSt;
        if (flightStatus === 'Dispatched') {
            show('#flight-stage-dispatched');
            renderDispatchedPanel(status);
        } else if (flightStatus === 'Preflight') {
            show('#flight-stage-preflight');
            renderPreflightPanel(status);
        } else if (flightStatus === 'Departure') {
            show('#flight-stage-departure');
            renderDeparturePanel(status);
        } else if (flightStatus === 'Flying') {
            show('#flight-stage-flying');
            renderFlyingPanel(status);
        } else if (flightStatus === 'Arrival') {
            show('#flight-stage-arrival');
            renderArrivalPanel(status);
        } else if (flightStatus === 'Postflight') {
            show('#flight-stage-postflight');
            renderPostflightPanel(status);
        } else if (flightStatus === 'Finished') {
            show('#flight-stage-finished');
            renderFinishedPanel(status);
        }
    }

    function renderDispatchedPanel(status) {
        hide('#flight-stage-dispatched-start-flight-disabled-button');
        hide('#flight-stage-dispatched-start-flight-button');

        const startFlightAction = status.sim.actions.find(a => a.name === "start-flight");
        if (startFlightAction && startFlightAction.allowed) {
            show('#flight-stage-dispatched-start-flight-button');
        } else {
            show('#flight-stage-dispatched-start-flight-disabled-button');
        }
    }

    function action_StartFlight() {
        hide('#flight-stage-dispatched');
        sendAction('start-flight');
    }

    function renderPreflightPanel(status) {
        hide('#flight-stage-preflight-start-boarding-disabled-button');
        hide('#flight-stage-preflight-start-boarding-button');
        hide('#flight-stage-preflight-blocks-off-automatically-button');

        const startBoardingAction = status.sim.actions.find(a => a.name === "start-boarding");
        if (startBoardingAction) {
            if (startBoardingAction.allowed) {
                show('#flight-stage-preflight-start-boarding-button');
            } else {
                show('#flight-stage-preflight-start-boarding-disabled-button');
            }
        }

        const blocksOffAction = status.sim.actions.find(a => a.name === "blocks-off");
        if (blocksOffAction) {
            show('#flight-stage-preflight-blocks-off-automatically-button');
        }
    }

    function action_StartBoarding() {
        hide('#flight-stage-preflight');
        sendAction('start-boarding');
    }

    function renderDeparturePanel(status) {

    }

    function renderFlyingPanel(status) {

    }

    function renderArrivalPanel(status) {

    }

    function renderPostflightPanel(status) {
        hide('#flight-stage-postflight-start-deboarding-disabled-button');
        hide('#flight-stage-postflight-start-deboarding-button');

        hide('#flight-stage-postflight-finish-flight-disabled-button');
        hide('#flight-stage-postflight-finish-flight-button');

        const startDeboardingAction = status.sim.actions.find(a => a.name === "start-deboarding");
        if (startDeboardingAction) {
            if (startDeboardingAction.allowed) {
                show('#flight-stage-postflight-start-deboarding-button');
            } else {
                show('#flight-stage-postflight-start-deboarding-disabled-button');
            }
        }

        const finishFlightAction = status.sim.actions.find(a => a.name === "finish-flight");
        if (finishFlightAction) {
            if (finishFlightAction.allowed) {
                show('#flight-stage-postflight-finish-flight-button');
            } else {
                show('#flight-stage-postflight-finish-flight-disabled-button');
            }
        }
    }

    function action_StartDeboarding() {
        hide('#flight-stage-postflight');
        sendAction('start-deboarding');
    }

    function action_FinishFlight() {
        hide('#flight-stage-postflight');
        sendAction('finish-flight');
    }

    function renderFinishedPanel(status) {

    }

    function renderFlightTimeField(id, status, time) {
        $(id).removeClass('time-planned').removeClass('time-estimated').removeClass('time-actual');

        const planned = status.flight[`p${time}`];
        const estimated = status.flight[`e${time}`];
        const actual = status.flight[`a${time}`];

        if (actual) {
            $(id).text(actual).addClass('time-actual');
        } else if (estimated) {
            $(id).text(estimated).addClass('time-estimated');
        } else {
            $(id).text(planned).addClass('time-planned');
        }
    }

/*    function selectFlight(selectedId) {
        selectedFlightId = selectedId;
        flightId = selectedId;
        renderFlightList();
        refreshSelectedFromMyFlights();

    function loadMyFlights(restartTimer) {
        airwaysAuth('GET', '/flight-dashboard/my-flights', {}, function (response) {
            myFlights = (response && response.flights) ? response.flights : [];
            if (!flightId) {
                selectedFlightId = myFlights?.[0]?.flight?.id ?? null;
                flightId = selectedFlightId;
            } else {
                selectedFlightId = flightId;
            }
            // renderFlightList();
            refreshSelectedFromMyFlights();
            if (restartTimer) {
                restartRefreshTimer();
            }
        }, function () {
            $('#flightList').empty().append(
                '<li class="list-group-item text-danger">Failed to load flights (check token in localStorage: airwaysToken)</li>'
            );
        });
    }

    function loadStatus2() {
        airwaysAuth('GET', '/flight-dashboard/status2', {}, function (response) {
            renderStatus2(response);
        });
    }

    function sendAction(actionName) {
        airwaysAuth('POST', `/flight-dashboard/${actionName}`, {
            flightId: flightId,
        }, function (response) {
            renderStatus2(response);
        }, function (e) {

        });
    }

    function show(id) {
        $(id).removeClass('hidden');
    }

    function hide(id) {
        $(id).addClass('hidden');
    }


    $(document).ready(function () {
        loadMyFlights(true);
        loadStatus2();
    });

</script>
